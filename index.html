<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kompresor Dokumen PWA</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 2rem; background-color: #f3f4f6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid #e5e7eb; padding: 2.5rem; border-radius: 8px; background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 1.5rem; }
        h2 { color: #005a9e; margin-top: 0; margin-bottom: 1.5rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; }
        label { font-weight: 600; display: block; margin-bottom: 0.5rem; }
        select, input[type="file"] { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Grup Tombol Flexbox */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button { color: white; border: none; padding: 12px; cursor: pointer; border-radius: 4px; font-weight: bold; flex: 1; font-size: 1rem; transition: background-color 0.2s; }
        
        /* Diferensiasi Warna Tombol */
        #compressBtn { background-color: #005a9e; }
        #compressBtn:hover { background-color: #004578; }
        #compressBtn:disabled { background-color: #9ca3af; cursor: not-allowed; }
        
        #resetBtn { background-color: #ef4444; }
        #resetBtn:hover { background-color: #dc2626; }

        #status { margin-top: 1.5rem; font-style: italic; color: #4b5563; text-align: center; min-height: 24px; }

        #downloadLink { display: none; background-color: #10b981; color: white; padding: 12px 24px; border-radius: 4px; text-decoration: none; font-weight: bold; text-align: center; width: 100%; box-sizing: border-box; margin-top: 10px; transition: background-color 0.2s; }
        #downloadLink:hover { background-color: #059669; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Kompresi Dokumen Word Terlokalisasi</h2>
        
        <div class="form-group">
            <label for="docFile">Unggah Berkas Arsip (.docx):</label>
            <input type="file" id="docFile" accept=".docx">
        </div>
        
        <div class="form-group">
            <label for="quality">Kualitas Gambar:</label>
            <select id="quality">
                <option value="0.8">Tinggi (80%)</option>
                <option value="0.5" selected>Menengah (50%)</option>
                <option value="0.3">Rendah (30%)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="formatOption">Format Gambar Output:</label>
            <select id="formatOption">
                <option value="forceJpg" selected>Konversi Semua ke JPG (Rasio Kompresi Maksimal)</option>
                <option value="keep">Pertahankan Asli (Transparansi PNG Terjaga)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="bgColorOption">Latar Belakang (Bila PNG dikonversi ke JPG):</label>
            <select id="bgColorOption">
                <option value="white" selected>Putih Solid</option>
                <option value="black">Hitam Solid</option>
            </select>
        </div>
        
        <div class="action-buttons">
            <button id="compressBtn">Eksekusi Kompresi</button>
            <button id="resetBtn">Reset Formulir</button>
        </div>
        
        <p id="status"></p>
        <a id="downloadLink">Simpan Berkas Terkompresi</a>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
